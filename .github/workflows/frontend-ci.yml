name: Frontend CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: frontend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (required)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Create environment files
        run: |
          mkdir -p src/environments
          echo "export const environment = { production: false, apiUrl: 'http://localhost:8081/api' };" > src/environments/environment.ts
          echo "export const environment = { production: false, apiUrl: 'http://localhost:8081/api' };" > src/environments/environment.development.ts

      - name: Build
        run: npm run build -- --configuration development

      - name: Upload dist artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist/

  tests:
    name: Tests (non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Create environment files
        run: |
          mkdir -p src/environments
          echo "export const environment = { production: false, apiUrl: 'http://localhost:8081/api' };" > src/environments/environment.ts
          echo "export const environment = { production: false, apiUrl: 'http://localhost:8081/api' };" > src/environments/environment.development.ts

      - name: Run unit tests (headless)
        run: npm run test -- --watch=false --no-progress

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: coverage/
