<header
  class="sticky top-0 z-20 flex items-center justify-between gap-3 border-b border-gray-200 bg-white/90 px-5 py-3 backdrop-blur"
>
  <div class="flex items-center gap-3">
    <button
      class="inline-flex cursor-pointer items-center justify-center rounded-lg border border-gray-200 bg-white p-2 text-gray-500 hover:bg-gray-50 lg:hidden"
      type="button"
      (click)="onToggleSidebar()"
    >
      <i class="fa-solid fa-bars text-sm"></i>
    </button>
    <div>
      <h1 class="m-0 text-lg font-bold text-gray-900">{{ title }}</h1>
      <p class="m-0 text-[12px] text-gray-400">{{ subtitle }}</p>
    </div>
  </div>

  <div class="flex items-center gap-3">
    <app-notification-bell />
    
    @if (showingAlerts) {
      <button
        class="relative inline-flex cursor-pointer items-center justify-center rounded-lg border border-gray-200 bg-white p-2.5 text-gray-500 transition hover:bg-gray-50"
        type="button"
        [routerLink]="alertsRoute"
      >
        <i class="fa-solid fa-triangle-exclamation text-[15px]"></i>
        @if (alertsCount > 0) {
          <span class="absolute -top-1 -right-1 inline-flex h-4 min-w-4 items-center justify-center rounded-full bg-red-500 px-1 text-[9px] font-bold text-white">
            {{ alertsCount }}
          </span>
        }
      </button>
    }

    <div
      class="hidden items-center gap-2.5 rounded-full border border-gray-200 py-1.5 pr-1.5 pl-3 md:flex"
    >
      <span class="text-[13px] font-medium text-gray-700">{{ fullName }}</span>
      @if (profileImage) {
        <img
          [src]="profileImage"
          alt="Avatar"
          class="h-8 w-8 rounded-full object-cover"
        />
      } @else {
        <div
          class="flex h-8 w-8 items-center justify-center rounded-full bg-linear-to-br from-blue-600 to-sky-500 text-xs font-bold text-white"
        >
          {{ initials }}
        </div>
      }
    </div>
  </div>
</header>
