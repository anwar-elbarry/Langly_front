<div class="relative">
  <!-- Bell button -->
  <button
    class="relative inline-flex cursor-pointer items-center justify-center rounded-lg border border-gray-200 bg-white p-2 text-gray-500 transition hover:bg-gray-50 hover:text-gray-700"
    type="button"
    (click)="toggleDropdown()">
    <i class="fa-solid fa-bell text-sm"></i>
    @if (unreadCount() > 0) {
    <span
      class="absolute -top-1 -right-1 flex h-4 min-w-4 items-center justify-center rounded-full bg-red-500 px-1 text-[10px] font-bold text-white">
      {{ unreadCount() > 99 ? '99+' : unreadCount() }}
    </span>
    }
  </button>

  <!-- Dropdown -->
  @if (showDropdown()) {
  <div
    class="absolute right-0 top-full z-50 mt-2 w-80 overflow-hidden rounded-xl border border-gray-200 bg-white shadow-lg">
    <!-- Header -->
    <div class="flex items-center justify-between border-b border-gray-200 px-4 py-3">
      <h4 class="m-0 text-sm font-semibold text-gray-900">Notifications</h4>
      @if (unreadCount() > 0) {
      <button
        class="cursor-pointer rounded-md border-0 bg-transparent px-2 py-1 text-xs font-medium text-emerald-600 transition hover:bg-emerald-50"
        type="button"
        (click)="markAllAsRead()">
        Tout marquer comme lu
      </button>
      }
    </div>

    <!-- Notifications list -->
    <div class="max-h-80 overflow-y-auto">
      @if (loading()) {
      <div class="flex items-center justify-center py-8">
        <div class="h-5 w-5 animate-spin rounded-full border-2 border-gray-300 border-t-emerald-600"></div>
      </div>
      } @else if (notifications().length === 0) {
      <div class="flex flex-col items-center justify-center py-8">
        <i class="fa-solid fa-bell-slash text-2xl text-gray-300"></i>
        <p class="mt-2 text-xs text-gray-400">Aucune notification</p>
      </div>
      } @else {
      @for (notification of notifications(); track notification.id) {
      <button
        class="flex w-full cursor-pointer items-start gap-3 border-0 border-b border-gray-100 px-4 py-3 text-left transition hover:bg-gray-50"
        [class.bg-emerald-50/50]="notification.status === 'UNREAD'"
        type="button"
        (click)="markAsRead(notification)">
        <div class="mt-0.5 flex h-8 w-8 shrink-0 items-center justify-center rounded-full bg-gray-100">
          <i class="text-xs" [class]="getNotificationIcon(notification.type)"></i>
        </div>
        <div class="min-w-0 flex-1">
          <div class="flex items-center gap-2">
            <p class="m-0 truncate text-sm font-medium text-gray-900">{{ notification.title }}</p>
            @if (notification.status === 'UNREAD') {
            <span class="h-2 w-2 shrink-0 rounded-full bg-emerald-500"></span>
            }
          </div>
          <p class="m-0 mt-0.5 line-clamp-2 text-xs text-gray-500">{{ notification.message }}</p>
          <p class="m-0 mt-1 text-[11px] text-gray-400">{{ timeAgo(notification.createdAt) }}</p>
        </div>
      </button>
      }
      }
    </div>
  </div>
  }
</div>
