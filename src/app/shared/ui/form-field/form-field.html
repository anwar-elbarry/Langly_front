<div class="form-field" [class.has-error]="error">
    @if (label) {
    <label class="form-label">
        {{ label }}
        @if (required) {
        <span class="form-required">*</span>
        }
    </label>
    }

    <div class="form-control">
        <ng-content />
    </div>

    @if (error) {
    <p class="form-error">{{ error }}</p>
    } @else if (hint) {
    <p class="form-hint">{{ hint }}</p>
    }
</div>
