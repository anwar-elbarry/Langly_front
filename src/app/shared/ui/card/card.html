<div class="ui-card" [class.ui-card-hoverable]="hoverable()">
    @if (imageSrc()) {
    <div class="ui-card-image">
        <img [src]="imageSrc()" [alt]="imageAlt()" />
    </div>
    }

    <div class="ui-card-body">
        <ng-content />
    </div>

    <div class="ui-card-footer">
        <ng-content select="[card-footer]" />
    </div>
</div>
