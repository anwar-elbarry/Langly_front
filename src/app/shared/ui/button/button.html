<button class="btn" [class.btn-primary]="variant === 'primary'" [class.btn-secondary]="variant === 'secondary'"
    [class.btn-outline]="variant === 'outline'" [class.btn-ghost]="variant === 'ghost'"
    [class.btn-danger]="variant === 'danger'" [class.btn-success]="variant === 'success'"
    [class.btn-link]="variant === 'link'" [class.btn-sm]="size === 'sm'" [class.btn-md]="size === 'md'"
    [class.btn-lg]="size === 'lg'" [class.btn-full]="fullWidth" [class.btn-loading]="loading"
    [disabled]="disabled || loading" [type]="type">
    @if (loading) {
    <span class="btn-spinner"></span>
    }
    <ng-content />
</button>
