<app-dashboard-aside
  [isSidebarOpen]="isSidebarOpen()"
  [isSidebarCollapsed]="isSidebarCollapsed()"
  [navItems]="navItems"
  [bottomNavItems]="bottomNavItems"
  logoIcon="fa-solid fa-chalkboard-user"
  badgeLabel="Professeur"
  roleLabel="Professeur"
  accentBg="bg-sky-50"
  accentText="text-sky-600"
  gradientFrom="from-blue-600"
  gradientTo="to-sky-500"
  [fullName]="fullName()"
  [initials]="initials()"
  [profileImage]="user()?.profile"
  (closeSidebar)="closeSidebar()"
  (toggleCollapse)="toggleCollapse()"
  (logout)="logout()"
/>

<!-- Main content -->
<section
  class="flex min-h-screen min-w-0 flex-col bg-gray-50 transition-all duration-300"
  [class.lg:ml-72]="!isSidebarCollapsed()"
  [class.lg:ml-[72px]]="isSidebarCollapsed()"
>
  <!-- Header -->
  <app-dashboard-header
    title="Tableau de Bord"
    subtitle="Espace Professeur"
    [fullName]="fullName()"
    [initials]="initials()"
    [profileImage]="user()?.profile"
    (toggleSidebar)="toggleSidebar()"
  />

  <!-- Page content -->
  <main class="flex-1 p-4 md:p-6">
    <router-outlet />
  </main>
</section>
