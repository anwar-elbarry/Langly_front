<!-- Header -->
<div class="mb-6">
  <h2 class="text-xl font-bold text-gray-900">Langues</h2>
  <p class="text-sm text-gray-500">Langues disponibles dans votre école</p>
</div>

@if (loading()) {
  <div class="flex h-64 items-center justify-center">
    <app-spinner size="lg" />
  </div>
} @else {
  <div class="grid grid-cols-2 gap-4 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5">
    @for (lang of languages(); track lang.value) {
      <div class="flex flex-col items-center rounded-xl border border-gray-200 bg-white p-6 shadow-sm transition-all duration-200 hover:border-blue-300 hover:shadow-md">
        @if (lang.flagUrl) {
          <img [src]="lang.flagUrl" [alt]="lang.label" class="h-16 w-16 rounded-lg object-cover shadow-sm" />
        } @else {
          <div class="flex h-16 w-16 items-center justify-center rounded-lg bg-gray-100">
            <i class="fa-solid fa-globe text-2xl text-gray-400"></i>
          </div>
        }
        <h3 class="mt-4 text-[15px] font-semibold text-gray-900">{{ lang.label }}</h3>
        <span class="mt-1 inline-flex items-center rounded-full bg-blue-50 px-2.5 py-0.5 text-xs font-medium text-blue-700">
          {{ lang.courseCount }} {{ lang.courseCount === 1 ? 'cours' : 'cours' }}
        </span>
      </div>
    }
  </div>
}
